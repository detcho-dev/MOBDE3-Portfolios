<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُبدِع | منصة المبدعين العرب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>مرحباً بك في <span class="brand">مُبدِع</span></h1>
            <p>اعرض أعمالك، ابنِ هويتك، وتواصل مع المبدعين العرب.</p>
        </header>

        <main class="login-section card">
            <h2>تسجيل الدخول / إنشاء حساب</h2>
            
            <div class="social-grid">
                <button class="btn-social google" id="btnGoogle">
                    <img src="google-logo-search-new-svgrepo-com.svg" alt="Google">
                    جوجل
                </button>
                <button class="btn-social github" id="btnGithub">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub">
                    جيت هاب
                </button>
            </div>

            <div class="separator">أو عبر البريد السريع</div>

            <form id="passlessForm">
                <div class="form-group">
                    <input type="email" id="userEmail" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                <button type="submit" class="btn-main">أرسل رابط الدخول (Passless)</button>
            </form>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
