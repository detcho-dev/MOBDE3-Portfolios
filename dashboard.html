<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُبدِع | لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="dashboard-nav">
        <div class="nav-container">
            <span class="brand">مُبدِع</span>
            <div class="user-info">
                <span id="userName">جاري التحميل...</span>
                <button class="btn-logout" id="btnLogout">تسجيل خروج</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <section class="add-work card">
            <h2>إضافة عمل إبداعي جديد ✨</h2>
            <form id="addProjectForm">
                <div class="form-group">
                    <label>عنوان المشروع</label>
                    <input type="text" id="pTitle" placeholder="مثلاً: تطبيق إدارة مهام" required>
                </div>
                <div class="form-group">
                    <label>رابط الصورة (Thumbnail)</label>
                    <input type="url" id="pImage" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="form-group">
                    <label>وصف مختصر</label>
                    <textarea id="pDesc" rows="3" placeholder="اشرح فكرة مشروعك باختصار..."></textarea>
                </div>
                <div class="form-group">
                    <label>رابط المشروع (اختياري)</label>
                    <input type="url" id="pLink" placeholder="https://github.com/your-repo">
                </div>
                <button type="submit" class="btn-main" id="btnSave">نشر العمل</button>
            </form>
        </section>

        <section class="my-works">
            <div class="section-header">
                <h2>أعمالي المنشورة</h2>
                <button class="btn-copy" id="btnShareProfile">نسخ رابط صفحتي 🔗</button>
            </div>
            <div class="works-grid" id="worksGrid">
                <p id="noWorks">لا يوجد أعمال منشورة بعد، ابدأ بإضافة أول عمل!</p>
            </div>
        </section>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
